# Automatically opens PRs when npm dependencies have new versions.
# Keeps @actions/* packages and devDependencies up to date.

version: 2

updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: UTC
      open-pull-requests-limit: 5
      groups:
          actions-packages:
              patterns:
                  - '@actions/*'
          dev-dependencies:
              dependency-type: development
      labels:
          - dependencies
          - automated
      commit-message:
          prefix: 'chore(deps)'

    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
          day: monday
      labels:
          - dependencies
          - github-actions
      commit-message:
          prefix: 'chore(actions)'