# Runs on every push and pull request.
# Performs linting, unit tests, and build verification.

name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read  # Least-privilege: read-only for CI

jobs:
    lint-test-build:
        name: Lint / Test / Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --ignore-scripts   # --ignore-scripts prevents malicious postinstall

            - name: Check for vulnerabilities
              run: npm audit --audit-level=high

            - name: Run ESLint
              run: npm run lint

            - name: Run unit tests with coverage
              run: npm run test:coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 7

            - name: Build dist
              run: npm run build

            - name: Verify dist was updated
                # Fails the CI if dist/index.js is out of sync with src/index.js
              run: |
                  if [ -n "$(git status --porcelain dist/)" ]; then
                    echo "::error::dist/index.js is out of sync. Run 'npm run build' and commit."
                    exit 1
                  fi

            - name: Run action smoke test (dry-run)
              uses: ./
              with:
                  webhook-url: https://prod-00.westus.logic.azure.com/workflows/dry-run-placeholder
                  title: 'CI Smoke Test'
                  message: 'Verifying action runs without errors.'
                  dry-run: 'true'